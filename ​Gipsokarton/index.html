<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор Гіпсокартону Pro</title>
    
    <meta name="google-site-verification" content="google81a9add93ea0f90e" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0B0B0B;
            --panel-bg: #141414;
            --accent-gold: #D4AF37;
            --accent-gold-hover: #F3E5AB;
            --text-main: #FFFFFF;
            --text-muted: #8A8A8A;
            --border-color: #262626;
            --neon-glow: 0 0 20px rgba(212, 175, 55, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px 12px 100px 12px;
        }

        /* Стилі для блоку переходу між калькуляторами */
        .navigation-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: var(--neon-glow);
        }

        .navigation-title {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--accent-gold);
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: center;
            font-weight: 600;
        }

        .navigation-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .nav-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 10px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .nav-button:hover, .nav-button:active {
            background: rgba(212, 175, 55, 0.1);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
                .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFF 0%, var(--accent-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        .card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--neon-glow);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            color: #fff;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-wrapper input:focus, .input-wrapper select:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            background-color: rgba(255, 255, 255, 0.05);
        }

        .input-wrapper .unit {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn-calc {
            width: 100%;
            background: linear-gradient(135deg, var(--accent-gold) 0%, #B8860B 100%);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            margin-top: 10px;
        }

        .btn-calc:active {
            transform: scale(0.98);
        }

        .results-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-gold);
            padding-left: 8px;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-row:last-child {
            border-bottom: none;
        }

        .result-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .result-value {
            font-weight: 600;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="navigation-panel">
        <div class="navigation-title">Інші калькулятори</div>
        <div class="navigation-links">
            <a href="https://stas8146-lgtm.github.io/buildcalk/Styazhka/" class="nav-button">
                <i data-lucide="layers" style="width: 16px; height: 16px;"></i>
                Стяжка
            </a>
            <a href="https://stas8146-lgtm.github.io/buildcalk/Omietky/" class="nav-button">
                <i data-lucide="paint-bucket" style="width: 16px; height: 16px;"></i>
                Штукатурка
            </a>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>Гіпсокартон Pro</h1>
            <p>Розрахунок каркасу, ГКЛ та кріплення</p>
        </header>

        <div class="card">
            <div class="grid-2">
                <div class="input-group">
                    <label>Довжина стіни/стелі</label>
                    <div class="input-wrapper">
                        <input type="number" id="length" step="0.1" placeholder="4.5">
                        <span class="unit">м</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>Ширина/Висота</label>
                    <div class="input-wrapper">
                        <input type="number" id="width" step="0.1" placeholder="3.0">
                        <span class="unit">м</span>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label>Тип конструкції</label>
                <div class="input-wrapper">
                    <select id="type">
                        <option value="wall-1">Стіна (Облицювання 1 шар)</option>
                        <option value="wall-2">Стіна (Облицювання 2 шари)</option>
                        <option value="ceiling">Стеля підвісна (1 шар)</option>
                        <option value="partition-1">Перегородка (1 шар з обох боків)</option>
                        <option value="partition-2">Перегородка (2 шари з обох боків)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Крок профілю (CD-60)</label>
                <div class="input-wrapper">
                    <select id="step">
                        <option value="600">600 мм (Стандарт)</option>
                        <option value="400">400 мм (Посилений)</option>
                    </select>
                </div>
            </div>

            <button class="btn-calc" onclick="calculate()">Розрахувати матеріали</button>
        </div>

        <div class="card" id="results-card" style="display: none;">
            <h3 class="results-title">Необхідні матеріали</h3>
            <div id="results-list"></div>
        </div>
    </div>
        <script>
        // Ініціалізація іконок Lucide
        lucide.createIcons();

        function calculate() {
            const length = parseFloat(document.getElementById('length').value);
            const width = parseFloat(document.getElementById('width').value);
            const type = document.getElementById('type').value;
            const step = parseInt(document.getElementById('step').value);

            if (!length || !width || length <= 0 || width <= 0) {
                alert("Будь ласка, введіть коректні розміри стіни/стелі.");
                return;
            }

            const area = length * width;
            const perimeter = 2 * (length + width);

            let gkl = 0;
            let ud27 = 0;
            let cd60 = 0;
            let es = 0; // П-подібні підвіси (ПЕШки)
            let LN = 0; // Саморізи «блошки» 3.5х9.5
            let TN25 = 0; // Саморізи по металу 25 мм
            let TN35 = 0; // Саморізи по металу 35 мм
            let dowel = 0; // Дюбелі швидкого монтажу 6х40
            let tape = 0; // Стрічка серпянка
            let fuge = 0; // Шпаклівка для швів (кг)
            let longitudinal = 0; // Подовжувачі профілю
            let crab = 0; // З'єднувачі однорівневі (краби)

            const gklArea = 3.0; // Площа одного листа ГКЛ (1.2м х 2.5м)

            // Базові алгоритми розрахунку
            if (type.startsWith('wall-')) {
                const layers = parseInt(type.split('-')[1]);
                gkl = (area / gklArea) * layers * 1.05;

                ud27 = perimeter * 1.05 / 3.0;
                
                const profilesCount = Math.ceil((length * 1000) / step) + 1;
                cd60 = (profilesCount * width) * 1.05 / 3.0;

                const esPerProfile = Math.ceil(width / 0.8) - 1;
                es = profilesCount * esPerProfile;

                dowel = (perimeter / 0.3) + (es * 2);
                LN = es * 4;
                
                if (layers === 1) {
                    TN25 = area * 15;
                } else {
                    TN25 = area * 8;
                    TN35 = area * 15;
                }
                
                tape = area * 1.5;
                fuge = area * 0.4;
            } else if (type === 'ceiling') {
                gkl = (area / gklArea) * 1.05;
                ud27 = perimeter * 1.05 / 3.0;

                const mainCD = (length / 0.8) * width;
                const crossCD = (width / 0.4) * length;
                cd60 = (mainCD + crossCD) * 1.05 / 3.0;

                es = (mainCD / 0.7) * 1.05;
                crab = (length / 0.8) * (width / 0.4);

                dowel = (perimeter / 0.3) + (es * 2);
                LN = (es * 4) + (crab * 8);
                TN25 = area * 17;
                tape = area * 1.5;
                fuge = area * 0.4;
            } else if (type.startsWith('partition-')) {
                const layers = parseInt(type.split('-')[1]);
                gkl = (area / gklArea) * layers * 2 * 1.05;

                ud27 = perimeter * 1.05 / 3.0;

                const profilesCount = Math.ceil((length * 1000) / step) + 1;
                cd60 = (profilesCount * width) * 1.05 / 3.0;

                dowel = perimeter / 0.3;
                
                if (layers === 1) {
                    TN25 = area * 30;
                } else {
                    TN25 = area * 15;
                    TN35 = area * 30;
                }

                tape = area * 3.0;
                fuge = area * 0.8;
            }
                        const results = [
                { name: "Площа конструкції", val: area.toFixed(2), unit: "м²" },
                { name: "Гіпсокартонні листи (1.2 х 2.5 м)", val: Math.ceil(gkl), unit: "шт" },
                { name: "Профіль направляючий UD-27 (3 м)", val: Math.ceil(ud27), unit: "шт" },
                { name: "Профіль стійковий CD-60 (3 м)", val: Math.ceil(cd60), unit: "шт" },
                { name: "Підвіс П-подібний (ES 60/125)", val: Math.ceil(es), unit: "шт" },
                { name: "Дюбель швидкого монтажу (6х40)", val: Math.ceil(dowel / 10) * 10, unit: "шт" },
                { name: "Саморізи «блошки» (LN 3.5х9.5)", val: Math.ceil(LN / 50) * 50, unit: "шт" }
            ];

            if (TN25 > 0) {
                results.push({ name: "Саморізи по металу TN-25 (25 мм)", val: Math.ceil(TN25 / 50) * 50, unit: "шт" });
            }
            if (TN35 > 0) {
                results.push({ name: "Саморізи по металу TN-35 (35 мм)", val: Math.ceil(TN35 / 50) * 50, unit: "шт" });
            }
            if (crab > 0) {
                results.push({ name: "З'єднувач однорівневий «Краб»", val: Math.ceil(crab), unit: "шт" });
            }

            results.push(
                { name: "Стрічка армуюча (серпянка)", val: Math.ceil(tape), unit: "м.п." },
                { name: "Шпаклівка для швів (типу Фугенфюллер)", val: Math.ceil(fuge), unit: "кг" }
            );

            const listDiv = document.getElementById('results-list');
            listDiv.innerHTML = '';
            results.forEach(item => {
                listDiv.innerHTML += `
                    <div class="result-row">
                        <span class="result-label">${item.name}</span>
                        <span class="result-value">${item.val} ${item.unit}</span>
                    </div>
                `;
            });

            document.getElementById('results-card').style.display = 'block';
            document.getElementById('results-card').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
